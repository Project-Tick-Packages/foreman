name: "neozip: Lint"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
          fetch-depth: 0

      - name: Whitespace errors
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BASE_SHA="${BASE_SHA:-4b825dc642cb6eb9a060e54bf8d69288fbee4904}"
          git config core.whitespace blank-at-eol
          git diff --color --check "$BASE_SHA" -- './*' ':!*.patch' ':!*.pdf' ':!test/data/'
