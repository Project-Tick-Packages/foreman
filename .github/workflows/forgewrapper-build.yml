name: "ForgeWrapper: Build"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'forgewrapper' }}
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "8"
          architecture: x64
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -iS
      - uses: actions/upload-artifact@v7
        with:
          name: ForgeWrapper
          path: ${{ inputs.source-repository != '' && 'build/libs' || 'forgewrapper/build/libs' }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'forgewrapper' }}
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "8"
          architecture: x64
      - name: Build with Gradle
        env:
          IS_PUBLICATION: true
        run: |
          chmod +x ./gradlew
          ./gradlew publish -iS
      - uses: actions/upload-artifact@v7
        with:
          name: ForgeWrapper-Release
          path: ${{ inputs.source-repository != '' && 'build/libs' || 'forgewrapper/build/libs' }}
