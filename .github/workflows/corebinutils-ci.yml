name: "corebinutils: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'corebinutils' }}

    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v2
        with:
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bmake \
            libbsd-dev \
            libmd-dev \
            musl-tools

      - name: Configure
        run: |
          ./configure

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Test
        run: |
          make test
