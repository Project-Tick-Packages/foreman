name: "neozip: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

jobs:
  # OSB runs first — guards against wasting time on uncompilable code
  osb:
    name: OSB
    uses: ./.github/workflows/neozip-osb.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  analyze:
    name: Static Analysis
    needs: osb
    uses: ./.github/workflows/neozip-analyze.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  cmake:
    name: CMake
    needs: osb
    uses: ./.github/workflows/neozip-cmake.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  configure:
    name: Configure
    needs: osb
    uses: ./.github/workflows/neozip-configure.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  libpng:
    name: Libpng
    needs: osb
    uses: ./.github/workflows/neozip-libpng.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  link:
    name: Link
    needs: osb
    uses: ./.github/workflows/neozip-link.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  pigz:
    name: Pigz
    needs: osb
    uses: ./.github/workflows/neozip-pigz.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}

  pkgcheck:
    name: Package Check
    needs: osb
    uses: ./.github/workflows/neozip-pkgcheck.yml
    secrets: inherit
    with:
      source-repository: ${{ inputs.source-repository || '' }}
