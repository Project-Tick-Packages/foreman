name: Setup Linux dependencies
description: Install and setup dependencies for building MeshMC

inputs:
  github-token:
    description: GitHub token for authentication
    required: true

runs:
  using: composite

  steps:
    - name: Add GnuPG repository
      shell: bash
      run: |
        sudo apt-get -y update
        sudo apt-get -y install curl ca-certificates gnupg

        sudo install -d -m 0755 /usr/share/keyrings

        curl -fsSL \
          https://repos.gnupg.org/deb/gnupg/noble/gnupg-signing-key.gpg \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/gnupg-keyring.gpg >/dev/null

        sudo chmod a+r /usr/share/keyrings/gnupg-keyring.gpg

        cat <<'EOF' | sudo tee /etc/apt/sources.list.d/gnupg.sources >/dev/null
        Types: deb
        URIs: https://repos.gnupg.org/deb/gnupg/noble/
        Suites: noble
        Components: main
        Signed-By: /usr/share/keyrings/gnupg-keyring.gpg
        EOF

        sudo add-apt-repository -y ppa:kubuntu-ppa/backports
        sudo apt-get -y update

    - name: Install host dependencies
      shell: bash
      run: |
        sudo apt-get -y update
        sudo apt-get -y install \
          dpkg-dev \
          ninja-build extra-cmake-modules pkg-config scdoc \
          gamemode-dev libarchive-dev libqrencode-dev \
          libxcb-cursor-dev libtomlplusplus-dev libvulkan-dev \
          libgpgme-dev libgpgmepp-dev libqgpgmeqt6-dev

    - name: Setup AppImage tooling
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Determinate AppImage architecture to use
        dpkg_arch="$(dpkg-architecture -q DEB_HOST_ARCH_CPU)"
        case "$dpkg_arch" in
          "amd64")
            APPIMAGE_ARCH="x86_64"
            ;;
          "arm64")
            APPIMAGE_ARCH="aarch64"
            ;;
          *)
            echo "# 🚨 The Debian architecture \"$deb_arch\" is not recognized!" >> "$GITHUB_STEP_SUMMARY"
            exit 1
            ;;
        esac

        gh release download \
          --repo VHSgunzo/sharun \
          --pattern "sharun-$APPIMAGE_ARCH-aio" \
          --output ~/bin/sharun

        # FIXME!: revert this to probonopd/go-appimage once https://github.com/probonopd/go-appimage/pull/377 is merged!
        gh release download continuous \
          --repo DioEgizio/go-appimage \
          --pattern "mkappimage-*-$APPIMAGE_ARCH.AppImage" \
          --output ~/bin/mkappimage

        gh release download \
          --repo AppImageCommunity/AppImageUpdate \
          --pattern "AppImageUpdate-$APPIMAGE_ARCH.AppImage" \
          --output ~/bin/AppImageUpdate.AppImage
        chmod +x ~/bin/*
        echo "$HOME/bin" >> "$GITHUB_PATH"
